# =============================================================================
# K2-Adaptive-BedMesh macro snippets
#
# Three pieces to add/replace in your /mnt/UDISK/printer_data/config/gcode_macro.cfg
#
# 1. Replace your existing [gcode_macro G29] with the version below
# 2. Replace your existing [gcode_macro BED_MESH_CALIBRATE_START_PRINT] likewise
# 3. Insert the adaptive mesh block into your [gcode_macro START_PRINT] body
#
# All three pieces work together with the restore_bed_mesh.py extras module
# (see ../extras/restore_bed_mesh.py and ../config/printer.cfg.snippet).
# =============================================================================


# -----------------------------------------------------------------------------
# 1. G29 (replaces Creality's stock G29)
#
# Creality's master-server daemon fires "G29 BED_TEMP=NN" during print prep,
# regardless of slicer or upload path. The original G29 macro then runs a
# full hardcoded mesh through prtouch_v3_wrapper.so. We hijack G29 to be a
# no-op so the real adaptive mesh can run inside START_PRINT instead.
#
# We still emit a fake [G29_TIME] line because master-server's response
# parser scans for it as the "mesh complete" handshake.
# -----------------------------------------------------------------------------
[gcode_macro G29]
description: Hijacked - defers mesh to START_PRINT (adaptive). Emits fake [G29_TIME] so master-server is satisfied.
gcode:
  {% set bed_temp = params.BED_TEMP|default(0)|float %}
  {% if bed_temp > 0 %}
    M140 S{bed_temp}
  {% endif %}
  {% if "xy" not in printer.toolhead.homed_axes %}
    G28 X Y
  {% endif %}
  BED_MESH_CLEAR
  M118 G29 deferred: real mesh runs in START_PRINT (adaptive)
  M118 [G29_TIME]Execution time: 0.0 seconds, Time spent at each point: 0.0


# -----------------------------------------------------------------------------
# 2. BED_MESH_CALIBRATE_START_PRINT (replaces Creality's stock version)
#
# Same idea: master-server may also call this directly. Make it a no-op
# that emits the [G29_TIME] handshake. Real mesh happens in START_PRINT.
# -----------------------------------------------------------------------------
[gcode_macro BED_MESH_CALIBRATE_START_PRINT]
description: Hijacked - defers mesh to START_PRINT (adaptive). Emits fake [G29_TIME] so master-server is satisfied.
gcode:
  BED_MESH_CLEAR
  M118 BED_MESH_CALIBRATE_START_PRINT deferred to START_PRINT
  M118 [G29_TIME]Execution time: 0.0 seconds, Time spent at each point: 0.0


# -----------------------------------------------------------------------------
# 3. START_PRINT adaptive mesh block
#
# This block goes INSIDE your existing [gcode_macro START_PRINT] gcode body,
# AFTER the {% endif %} that closes the prepare==0/prepare==1 if/else, and
# BEFORE the next M140/BOX_GO_TO_EXTRUDE_POS lines. Reads MESH_MIN/MESH_MAX/
# PROBE_COUNT params that the slicer passes (see ../slicer/orca-start-gcode.txt
# for the matching Orca placeholders), and calls BED_MESH_CALIBRATE with them.
#
# Falls back to a full mesh if the slicer didn't pass adaptive params.
# Skip the mesh entirely with MESH=0 from the slicer.
# -----------------------------------------------------------------------------
#
#  ... your existing prepare==0 / prepare==1 if/else block ...
#  {% endif %}
#
#  ↓↓↓ INSERT THE BLOCK BELOW HERE ↓↓↓
#
  {% if params.MESH_MIN is defined and params.MESH_MAX is defined %}
    {% set bmin = params.MESH_MIN|float %}
    {% set bmax = params.MESH_MAX|float %}
    {% set pc = params.PROBE_COUNT|default(5)|int %}
    {% if pc < 3 %}{% set pc = 3 %}{% endif %}
    {% if pc > 7 %}{% set pc = 7 %}{% endif %}
    {% if bmin < 5 %}{% set bmin = 5 %}{% endif %}
    {% if bmax > 255 %}{% set bmax = 255 %}{% endif %}
    M118 Adaptive mesh: ({bmin},{bmin})..({bmax},{bmax}) probe={pc}x{pc}
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE MESH_MIN={bmin},{bmin} MESH_MAX={bmax},{bmax} PROBE_COUNT={pc},{pc}
  {% elif params.MESH|default(1)|int == 1 %}
    M118 No slicer mesh params - full mesh fallback
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE
  {% else %}
    M118 Mesh skipped (MESH=0 from slicer)
  {% endif %}
#
#  ↑↑↑ INSERT THE BLOCK ABOVE HERE ↑↑↑
#
#  M140 S{params.BED_TEMP}
#  M104 S{params.EXTRUDER_TEMP}
#  BOX_GO_TO_EXTRUDE_POS
#  ... rest of START_PRINT continues unchanged ...
